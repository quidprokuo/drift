<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  {%- seo -%}

  <link rel="icon" type="image/png" sizes="96x96"
        href="https://frgs3.s3.us-west-1.amazonaws.com/fragments/favicon/favicon-96x96.png">
  <link rel="icon" type="image/svg+xml"
        href="https://frgs3.s3.us-west-1.amazonaws.com/fragments/favicon/favicon.svg">
  <link rel="shortcut icon"
        href="https://frgs3.s3.us-west-1.amazonaws.com/fragments/favicon/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180"
        href="https://frgs3.s3.us-west-1.amazonaws.com/fragments/favicon/apple-touch-icon.png">
  <link rel="manifest"
        href="https://frgs3.s3.us-west-1.amazonaws.com/fragments/favicon/site.webmanifest">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Cormorant+Garamond:wght@600;700&display=swap">

  <meta name="theme-color" content="#141413">

  <style>
    :root {
      color-scheme: light;
      --bg: #ffffff;
      --text: #1f1f1e;
      --text-soft: #5a5a58;
      --text-mute: #888;
      --border: #e5e5e3;
      --link: #1d4ed8;
      --link-hover: #1e40af;
      --header-bg: #141413;
      --header-text: rgba(255, 255, 255, 0.92);
      --header-tag: #888;
      --header-link: #aaa;
      --header-link-hover: #fff;
    }

    * { box-sizing: border-box; }
    html { background: var(--header-bg); font-size: 16px; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, sans-serif;
      font-size: 17px;
      line-height: 1.7;
      margin: 0;
      -webkit-font-smoothing: antialiased;
    }

    /* Site chrome — always dark */
    .site-header {
      min-height: 64px;
      background: var(--header-bg);
      margin-bottom: 64px;
      display: flex;
      align-items: center;
    }
    .site-header_inner {
      max-width: 960px;
      width: 100%;
      margin: 0 auto;
      padding: 0 32px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .site-mark {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-weight: 700;
      font-size: 22px;
      letter-spacing: 0.02em;
      color: var(--header-text);
      text-decoration: none;
    }
    .site-tag {
      font-size: 13px;
      color: var(--header-tag);
      letter-spacing: 0.02em;
    }
    .site-back {
      margin-left: auto;
      font-size: 13px;
      color: var(--header-link);
      text-decoration: none;
    }
    .site-back:hover { color: var(--header-link-hover); }

    /* Page body */
    .container {
      max-width: 960px;
      margin: 0 auto 96px;
      padding: 0 32px;
      font-size: 16px;
      line-height: 1.5;
    }
    h2 {
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-mute);
      margin: 48px 0 16px;
      font-weight: 600;
    }
    p { color: var(--text-soft); margin: 0 0 16px; }
    a { color: var(--link); text-decoration: underline; text-underline-offset: 2px; }
    ul { padding-left: 0; list-style: none; margin: 0; }
    li { margin: 0 0 12px; color: var(--text); }
    li a { color: var(--text); text-decoration: none; font-weight: 500; }
    li a:hover { color: var(--link); }

    /* Mobile adjustments */
    @media (max-width: 600px) {
      .site-header_inner { padding: 0 20px; gap: 12px; }
      .site-mark { font-size: 20px; }
      .site-tag { display: none; }
      .site-back { font-size: 12px; }

      .container { padding: 0 20px; }
    }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="site-header_inner">
      <a class="site-mark" href="{{ site.baseurl }}/">Drift &gt; Drag</a>
      <a class="site-back" href="https://2factor.finance/research/">← 2factor.finance/research</a>
    </div>
  </header>

  <main class="container">
    {{ content }}
  </main>

</body>
</html>

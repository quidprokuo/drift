<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>{{ page.title }} — Drift</title>

  <!-- jekyll-seo-tag handles og: and twitter: meta tags based on front matter -->
  {%- seo -%}

  <!-- Favicon — exact set used on 2factor.finance for consistency -->
  <link rel="icon" type="image/png" sizes="96x96"
        href="https://frgs3.s3.us-west-1.amazonaws.com/fragments/favicon/favicon-96x96.png">
  <link rel="icon" type="image/svg+xml"
        href="https://frgs3.s3.us-west-1.amazonaws.com/fragments/favicon/favicon.svg">
  <link rel="shortcut icon"
        href="https://frgs3.s3.us-west-1.amazonaws.com/fragments/favicon/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180"
        href="https://frgs3.s3.us-west-1.amazonaws.com/fragments/favicon/apple-touch-icon.png">
  <link rel="manifest"
        href="https://frgs3.s3.us-west-1.amazonaws.com/fragments/favicon/site.webmanifest">

  <!-- Fonts: Inter for body, Cormorant Garamond for titles (matches 2factor.finance) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Cormorant+Garamond:wght@600;700&display=swap">

  <meta name="theme-color" content="#141413">

  <!-- MathJax for LaTeX rendering — recognize $...$ for inline and $$...$$ for display -->
  <script>
    window.MathJax = {
      tex: {
        // Use \( \) for inline math only — leaves literal $ alone in prose
        // ("$100M", "$1B" etc. are common and must not be parsed as math)
        inlineMath: [['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true
      },
      svg: { fontCache: 'global' }
    };
  </script>
  <script id="MathJax-script" async
          src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

  <style>
    :root {
      color-scheme: light;
      --bg: #ffffff;
      --bg-soft: #f6f6f5;
      --text: #1f1f1e;
      --text-soft: #5a5a58;
      --text-mute: #888;
      --border: #e5e5e3;
      --link: #1d4ed8;
      --link-hover: #1e40af;
      --code-bg: #f3f3f1;
      --kbd-bg: #fafaf9;

      /* Header always dark, regardless of body theme — branded contrast */
      --header-bg: #141413;
      --header-text: rgba(255, 255, 255, 0.92);
      --header-tag: #888;
      --header-link: #aaa;
      --header-link-hover: #fff;
    }

    * { box-sizing: border-box; }

    html {
      background: var(--bg);
      font-size: 16px;
      -webkit-text-size-adjust: 100%;
      scroll-behavior: smooth;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, Avenir, Helvetica, Arial, sans-serif;
      font-size: 17px;
      line-height: 1.7;
      margin: 0;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Site chrome — always dark, regardless of body theme */

    .site-header {
      min-height: 64px;
      background: var(--header-bg);
      margin-bottom: 64px;
      display: flex;
      align-items: center;
    }

    .site-header_inner {
      max-width: 960px;
      width: 100%;
      margin: 0 auto;
      padding: 0 32px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .site-mark {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-weight: 700;
      font-size: 22px;
      letter-spacing: 0.02em;
      color: var(--header-text);
      text-decoration: none;
    }

    .site-tag {
      font-size: 13px;
      color: var(--header-tag);
      letter-spacing: 0.02em;
    }

    .site-back {
      margin-left: auto;
      font-size: 13px;
      color: var(--header-link);
      text-decoration: none;
    }

    .site-back:hover { color: var(--header-link-hover); }

    /* Article */

    .article {
      max-width: 960px;
      margin: 0 auto 96px;
      padding: 0 32px;
    }

    .article_kicker {
      display: block;
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-mute);
      margin: 0 0 16px;
    }

    .article_title {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: clamp(32px, 4vw, 44px);
      font-weight: 700;
      line-height: 1.15;
      margin: 0 0 16px;
      color: var(--text);
    }

    .article_tagline {
      font-size: 16px;
      color: var(--text-soft);
      line-height: 1.5;
      margin: 0 0 48px;
      font-style: italic;
    }

    /* Prose styles (the rendered markdown lives in .article_body) */

    .article_body {
      color: var(--text);
      font-size: 16px;
      line-height: 1.5;
    }

    .article_body h1,
    .article_body h2,
    .article_body h3,
    .article_body h4 {
      font-family: Inter, system-ui, sans-serif;
      font-weight: 600;
      line-height: 1.25;
      color: var(--text);
      margin: 24px 0 16px;
    }

    .article_body h2 { font-size: 1.5em; }
    .article_body h3 { font-size: 1.25em; }

    .article_body p {
      margin: 0 0 16px;
    }

    .article_body li {
      margin: 0 0 0.25em;
    }

    .article_body ul,
    .article_body ol {
      padding-left: 2em;
      margin: 0 0 16px;
    }

    .article_body strong { font-weight: 600; color: var(--text); }
    .article_body em { font-style: italic; }

    .article_body a {
      color: var(--link);
      text-decoration: underline;
      text-decoration-thickness: 1px;
      text-underline-offset: 2px;
    }
    .article_body a:hover { color: var(--link-hover); }

    .article_body blockquote {
      margin: 1.2em 0;
      padding: 0.4em 0 0.4em 1.2em;
      border-left: 3px solid var(--border);
      color: var(--text-soft);
      font-style: italic;
    }

    .article_body code {
      background: var(--code-bg);
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 0.9em;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    .article_body pre {
      background: var(--code-bg);
      padding: 16px;
      border-radius: 5px;
      overflow-x: auto;
      font-size: 14px;
      line-height: 1.5;
    }

    .article_body pre code {
      background: transparent;
      padding: 0;
    }

    /* Tables — used by the article for image+caption layout */

    .article_body table {
      width: 100%;
      margin: 2em 0;
      border-collapse: collapse;
    }

    .article_body th,
    .article_body td {
      padding: 12px 16px;
      border: 1px solid var(--border);
      text-align: left;
      vertical-align: top;
    }

    /* Figure-table pattern: single-column table with image + caption */
    .article_body table:has(picture) td,
    .article_body table:has(img:not([alt="?"])) td {
      padding: 16px;
    }

    /* Images and picture elements */

    .article_body img,
    .article_body picture img {
      max-width: 100%;
      height: auto;
      display: block;
    }

    .article_body picture {
      display: block;
    }

    /* Footnotes */

    .article_body .footnotes,
    .article_body .appendix {
      margin-top: 64px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      font-size: 14px;
      color: var(--text-soft);
    }

    .article_body .footnotes ol {
      padding-left: 1.4em;
    }

    .article_body .footnotes p,
    .article_body .appendix p {
      font-size: 14px;
      line-height: 1.6;
      margin: 0 0 0.8em;
    }

    .article_body .footnote-backref {
      text-decoration: none;
      margin-left: 4px;
    }

    /* Horizontal rules */

    .article_body hr {
      border: 0;
      border-top: 1px solid var(--border);
      margin: 3em 0;
    }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="site-header_inner">
      <a class="site-mark" href="{{ '/' | absolute_url }}">Drift &gt; Drag</a>
      <span class="site-tag">Research from 2factor finance</span>
      <a class="site-back" href="https://2factor.finance/research/">← 2factor.finance/research</a>
    </div>
  </header>

  <main class="article">

    <span class="article_kicker">2factor Research · {{ page.date | date: "%b %-d, %Y" }}</span>
    <h1 class="article_title">{{ page.title }}</h1>
    {% if page.tagline %}<p class="article_tagline">{{ page.tagline }}</p>{% endif %}

    <div class="article_body">
      {{ content }}
    </div>

  </main>

</body>
</html>
